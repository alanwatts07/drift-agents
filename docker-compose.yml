version: "3.8"

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: drift-agents-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: agent_memory
      POSTGRES_USER: drift_admin
      POSTGRES_PASSWORD: drift_agents_local_dev
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./shared/init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drift_admin -d agent_memory"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: drift-agents-graph
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/drift_graph_local
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512M
    volumes:
      - ./neo4jdata:/data
      - ./neo4jlogs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "drift_graph_local", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
